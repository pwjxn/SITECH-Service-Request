/* ---------------- Helpers ---------------- */
function timeAgo(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return "just now";
  if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
  return `${Math.floor(diff / 86400)}d ago`;
}
function fmtDateShort(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  if (isNaN(d)) return "—";
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
}
// Converts a stored date into the "YYYY-MM-DDTHH:mm" format a <input type="datetime-local">
// expects, using LOCAL time components. (Date.toISOString() would convert to UTC instead,
// shifting the displayed time by the browser's UTC offset — this avoids that.)
function toLocalInputValue(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d)) return "";
  const pad = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// Builds a Google Maps search URL from company + site/location text.
// Doesn't need a precise address — Maps handles fuzzy text search reasonably well.
function mapsUrlFor(company, site) {
  const query = [company, site].filter(Boolean).join(" ");
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`;
}

/* ---------------- Session persistence ----------------
   Remembers a successful login in this browser for a limited window, so
   reloading the page (or reopening the file) within that window skips the
   login screen. This only remembers "this browser logged in recently" —
   not who specifically — and is stored client-side only, nothing sent
   anywhere. Clears itself once the window passes, or on manual logout. */
const SESSION_STORAGE_KEY = "sitech_support_session";
const SESSION_DURATION_MS = 8 * 60 * 60 * 1000; // 8 hours

function hasValidSession() {
  try {
    const raw = localStorage.getItem(SESSION_STORAGE_KEY);
    if (!raw) return false;
    const { loggedInAt } = JSON.parse(raw);
    return Date.now() - loggedInAt < SESSION_DURATION_MS;
  } catch (err) {
    return false;
  }
}
function saveSession() {
  try {
    localStorage.setItem(SESSION_STORAGE_KEY, JSON.stringify({ loggedInAt: Date.now() }));
  } catch (err) { /* storage unavailable, e.g. in a sandboxed preview — session just won't persist */ }
}
function clearSession() {
  try {
    localStorage.removeItem(SESSION_STORAGE_KEY);
  } catch (err) { /* ignore */ }
}

  const [priorityFilter, setPriorityFilter] = useState("All");

  const [saving, setSaving] = useState(false);
  const [toast, setToast] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    const [r, t, c] = await Promise.all([apiList(), apiTechs(), apiCompanies()]);
    setRequests(r || []);
    setTechs(t || []);
    setCompanies(c || []);
    setLoading(false);
  }, []);

  useEffect(() => { if (loggedIn) load(); }, [loggedIn, load]);

  const handleLogin = async (username, password) => {
    setLoginLoading(true);
    setLoginError(null);
    const res = await apiLogin(username, password);
    setLoginLoading(false);
    if (res.success) {
      saveSession();
      setLoggedIn(true);
    } else {
      setLoginError("Incorrect username or password.");
    }
  };

  useEffect(() => {
    if (toast) {
      const t = setTimeout(() => setToast(null), 3000);
      return () => clearTimeout(t);
    }
  }, [toast]);

  const filtered = useMemo(() => {
    return requests.filter((r) => {
      if (statusFilter === "Active" && (r.Status === "Resolved" || r.Status === "Closed")) return false;
      if (statusFilter !== "Active" && statusFilter !== "All" && r.Status !== statusFilter) return false;
      if (priorityFilter !== "All" && r.Priority !== priorityFilter) return false;
      if (search) {
        const q = search.toLowerCase();
        const hay = `${r["Request ID"]} ${r["Company"]} ${r["Site / Location"]} ${r["Contact Name"]} ${r["Equipment / Model"]} ${r.Description}`.toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }, [requests, statusFilter, priorityFilter, search]);

  const stats = useMemo(() => {
    const open = requests.filter(r => r.Status !== "Resolved" && r.Status !== "Closed").length;
    const urgent = requests.filter(r => (r.Priority === "Urgent" || r.Priority === "High") && r.Status !== "Resolved" && r.Status !== "Closed").length;
    const weekAgo = Date.now() - 7 * 86400000;
    const resolvedWeek = requests.filter(r => r.Status === "Resolved" && new Date(r["Last Updated"]).getTime() > weekAgo).length;
    const scheduled = requests.filter(r => r.Status === "Scheduled" || r.Status === "In Progress").length;
    return { open, urgent, resolvedWeek, scheduled };
  }, [requests]);

  const handleCreate = async (formData) => {
    setSaving(true);
    const res = await apiCreate(formData);
    if (res.success) {
      setToast({ type: "success", msg: `Request ${res.requestId} submitted.` });
      setShowForm(false);
      await load();
    } else {
      setToast({ type: "error", msg: res.error || "Something went wrong." });
    }
    setSaving(false);
  };

  const handleUpdate = async (id, data) => {
    setSaving(true);
    const res = await apiUpdate(id, data);
    if (res.success) {
      setToast({ type: "success", msg: `${id} updated.` });
      setSelected(null);
      await load();
    } else {
      setToast({ type: "error", msg: res.error || "Update failed." });
    }
    setSaving(false);
  };

  if (!loggedIn) {
    return <LoginScreen onLogin={handleLogin} loading={loginLoading} error={loginError} />;
  }

  return (
    <div
      className="w-full min-h-[720px] flex"
      style={{ background: "#12181F", fontFamily: "'Inter', sans-serif", color: "#E8EAED" }}
    >
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap');
      `}</style>

      {/* Sidebar */}
      <div className="w-56 flex-shrink-0 flex flex-col border-r" style={{ borderColor: "#242D3A", background: "#161D26" }}>
        <div className="px-5 py-5 border-b" style={{ borderColor: "#242D3A" }}>
          <div className="text-[11px] tracking-[0.2em] uppercase" style={{ color: "#F5A623" }}>SITECH</div>
          <div className="text-lg font-bold" style={{ fontFamily: "'Oswald', sans-serif" }}>Support Desk</div>
        </div>
        <nav className="flex-1 px-3 py-4 space-y-1">
          <SidebarItem icon={ClipboardList} label="Dashboard" active={currentTab === "dashboard"} onClick={() => setCurrentTab("dashboard")} />
          <SidebarItem icon={CalendarDays} label="Calendar" active={currentTab === "calendar"} onClick={() => setCurrentTab("calendar")} />
        </nav>
        <div className="p-3 space-y-2">
          <button
            onClick={() => setShowForm(true)}
            className="w-full flex items-center justify-center gap-2 py-2.5 rounded-lg font-semibold text-sm transition-transform active:scale-[0.98]"
            style={{ background: "#F5A623", color: "#12181F" }}
          >
            <Plus size={16} strokeWidth={2.5} /> New Request
          </button>
          <button
            onClick={() => { clearSession(); setLoggedIn(false); }}
            className="w-full flex items-center justify-center gap-2 py-2 rounded-lg font-medium text-xs"
            style={{ background: "transparent", color: "#8B94A3" }}
          >
            <LogOut size={13} /> Log out
          </button>
        </div>
      </div>

      {/* Main */}
      <div className="flex-1 flex flex-col min-w-0">
        {/* Top bar */}
        <div className="flex items-center justify-between px-6 py-4 border-b" style={{ borderColor: "#242D3A" }}>
          <div>
            <h1 className="text-xl font-bold" style={{ fontFamily: "'Oswald', sans-serif" }}>
              {currentTab === "dashboard" ? "Service Requests" : "Dispatch Calendar"}
            </h1>
            <p className="text-sm" style={{ color: "#8B94A3" }}>
              {currentTab === "dashboard" ? "Field support tracking & dispatch" : "Scheduled visits by date"}
            </p>
          </div>
          {isDemo && (
            <span className="text-[11px] px-2.5 py-1 rounded-full font-medium" style={{ background: "#2A2418", color: "#F5A623" }}>
              Demo data — connect Apps Script URL to go live
            </span>
          )}
        </div>

        <div className="p-6 space-y-6 overflow-auto flex-1">
          {currentTab === "dashboard" ? (
            <>
              {/* Stats */}
              <div className="flex gap-4 flex-wrap">
                <StatCard label="Open Requests" value={stats.open} icon={ClipboardList} accent="#4FB8FF" />
                <StatCard label="High / Urgent" value={stats.urgent} icon={TriangleAlert} accent="#FF6B5E" />
                <StatCard label="Scheduled / Active" value={stats.scheduled} icon={Clock} accent="#38C89A" />
                <StatCard label="Resolved (7d)" value={stats.resolvedWeek} icon={CheckCircle2} accent="#4CAF50" />
              </div>

              {/* Controls */}
              <div className="flex items-center justify-between flex-wrap gap-3">
                <div className="flex items-center gap-2 flex-wrap">
                  <FilterSelect
                    value={statusFilter}
                    onChange={setStatusFilter}
                    options={["Active", "All", ...STATUS_ORDER]}
                  />
                  <FilterSelect
                    value={priorityFilter}
                    onChange={setPriorityFilter}
                    options={["All", ...PRIORITIES]}
                  />
                  <div className="relative">
                    <Search size={14} className="absolute left-2.5 top-1/2 -translate-y-1/2" color="#8B94A3" />
                    <input
                      value={search}
                      onChange={(e) => setSearch(e.target.value)}
                      placeholder="Search site, equipment, description…"
                      className="pl-8 pr-3 py-2 rounded-lg text-sm outline-none w-72"
                      style={{ background: "#1A222C", border: "1px solid #242D3A", color: "#E8EAED" }}
                    />
                  </div>
                </div>
                <div className="flex rounded-lg overflow-hidden border" style={{ borderColor: "#242D3A" }}>
                  <ViewToggleBtn active={view === "table"} onClick={() => setView("table")} icon={List} />
                  <ViewToggleBtn active={view === "kanban"} onClick={() => setView("kanban")} icon={LayoutGrid} />
                </div>
              </div>

              {/* Content */}
              {loading ? (
                <div className="flex items-center justify-center py-24" style={{ color: "#8B94A3" }}>
                  <Loader2 className="animate-spin mr-2" size={18} /> Loading requests…
                </div>
              ) : filtered.length === 0 ? (
                <div className="flex flex-col items-center justify-center py-24 text-center" style={{ color: "#8B94A3" }}>
                  <ClipboardList size={32} className="mb-3 opacity-50" />
                  <p className="font-medium" style={{ color: "#E8EAED" }}>No requests match these filters</p>
                  <p className="text-sm mt-1">Try clearing a filter or search term.</p>
                </div>
              ) : view === "table" ? (
                <TableView requests={filtered} onSelect={setSelected} />
              ) : (
                <KanbanView requests={filtered} onSelect={setSelected} />
              )}
            </>
          ) : (
            <CalendarView requests={requests} onSelect={setSelected} loading={loading} />
          )}
        </div>
      </div>

      {/* New request modal */}
      {showForm && (
        <NewRequestModal
          companies={companies}
          onClose={() => setShowForm(false)}
          onSubmit={handleCreate}
          saving={saving}
        />
      )}

      {/* Detail drawer */}
      {selected && (
        <DetailDrawer
          request={selected}
          techs={techs}
          onClose={() => setSelected(null)}
          onSave={handleUpdate}
          saving={saving}
        />
      )}

      {/* Toast */}
      {toast && (
        <div
          className="fixed bottom-6 right-6 px-4 py-3 rounded-lg shadow-lg text-sm font-medium z-50"
          style={{
            background: toast.type === "error" ? "#3A1F1C" : "#1E2A26",
            color: toast.type === "error" ? "#FF6B5E" : "#7FE0C4",
            border: `1px solid ${toast.type === "error" ? "#5A2F2A" : "#2A4A3E"}`,
          }}
        >
          {toast.msg}
        </div>
      )}
    </div>
  );
}

              {items.map((r) => (

          <div className="h-px" style={{ background: "#242D3A" }} />

          <Field label="Status">
            <select
              value={status}
              onChange={(e) => setStatus(e.target.value)}
              className="w-full px-3 py-2 rounded-lg text-sm outline-none"
              style={{ background: "#1A222C", border: "1px solid #242D3A", color: "#E8EAED" }}
            >
              {STATUS_ORDER.map((s) => <option key={s} value={s}>{s}</option>)}
            </select>
          </Field>

          <Field label="Assigned Tech">
            <select
              value={assignedTech}
              onChange={(e) => setAssignedTech(e.target.value)}
              className="w-full px-3 py-2 rounded-lg text-sm outline-none"
              style={{ background: "#1A222C", border: "1px solid #242D3A", color: "#E8EAED" }}
            >
              <option value="">Unassigned</option>
              {techs.map((t) => <option key={t["Tech Name"]} value={t["Tech Name"]}>{t["Tech Name"]}</option>)}
            </select>
          </Field>

          <Field label="Scheduled Start">
            <div className="relative">
              <CalendarIcon size={14} className="absolute left-3 top-1/2 -translate-y-1/2" color="#8B94A3" />
              <input
                type="datetime-local"
                value={scheduledStart}
                onChange={(e) => setScheduledStart(e.target.value)}
                className="w-full pl-9 pr-3 py-2 rounded-lg text-sm outline-none"
                style={{ background: "#1A222C", border: "1px solid #242D3A", color: "#E8EAED" }}
              />
            </div>
          </Field>

          <Field label="Scheduled End">
            <div className="relative">
              <CalendarIcon size={14} className="absolute left-3 top-1/2 -translate-y-1/2" color="#8B94A3" />
              <input
                type="datetime-local"
                value={scheduledEnd}
                onChange={(e) => setScheduledEnd(e.target.value)}
                className="w-full pl-9 pr-3 py-2 rounded-lg text-sm outline-none"
                style={{ background: "#1A222C", border: "1px solid #242D3A", color: "#E8EAED" }}
              />
            </div>
          </Field>

          {request["Calendar Event ID"] && (
            <p className="text-xs flex items-center gap-1.5" style={{ color: "#7FE0C4" }}>
              <CheckCircle2 size={12} /> Synced to Google Calendar
            </p>
          )}

          <Field label="Resolution Notes">
            <textarea
              value={notes}
              onChange={(e) => setNotes(e.target.value)}
              rows={3}
              placeholder="Add notes when resolving…"
              className="w-full px-3 py-2 rounded-lg text-sm outline-none resize-none"
              style={{ background: "#1A222C", border: "1px solid #242D3A", color: "#E8EAED" }}
            />
          </Field>

          <button
            onClick={save}
            disabled={saving}
            className="w-full py-2.5 rounded-lg text-sm font-semibold flex items-center justify-center gap-2 disabled:opacity-50"
            style={{ background: "#F5A623", color: "#12181F" }}
          >
            {saving && <Loader2 size={14} className="animate-spin" />} Save Changes
          </button>
        </div>
      </div>
    </div>
  );
}

function getMonday(date) {
  const d = new Date(date);
  const day = d.getDay(); // 0 = Sun, 1 = Mon, ... 6 = Sat
  const diff = day === 0 ? -6 : 1 - day; // shift Sunday back to previous Monday
  d.setDate(d.getDate() + diff);
  d.setHours(0, 0, 0, 0);
  return d;
}
function addDays(date, n) {
  const d = new Date(date);
  d.setDate(d.getDate() + n);
  return d;
}
function sameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}
function dateOnly(d) {
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}
// Returns { totalDays, dayIndex, isMultiDay } describing where `day` falls
// within a request's Scheduled Start–End span (by calendar date, not time).
function spanInfo(r, day) {
  const start = new Date(r["Scheduled Start"]);
  const end = r["Scheduled End"] ? new Date(r["Scheduled End"]) : start;
  const spanStart = dateOnly(start);
  const spanEnd = dateOnly(end);
  const totalDays = Math.round((spanEnd - spanStart) / 86400000) + 1;
  const dayIndex = Math.round((dateOnly(day) - spanStart) / 86400000) + 1;
  return { totalDays: Math.max(totalDays, 1), dayIndex, isMultiDay: totalDays > 1 };
}

// A fixed palette of visually distinct colors, chosen to avoid clashing with
// the existing semantic colors used elsewhere (amber=priority/brand,
// red=urgent, teal=scheduled, blue=new status), so a tech's color is never
// mistaken for a priority or status signal.
const TECH_COLOR_PALETTE = [
  "#A78BFA", // violet
  "#F472B6", // pink
  "#22D3EE", // cyan
  "#A3E635", // lime
  "#818CF8", // indigo
  "#FB7185", // rose
  "#E879F9", // fuchsia
  "#2DD4BF", // turquoise
];
function techColor(techName) {
  if (!techName) return "#3A4250"; // neutral gray for unassigned
  let hash = 0;
  for (let i = 0; i < techName.length; i++) {
    hash = (hash * 31 + techName.charCodeAt(i)) >>> 0;
  }
  return TECH_COLOR_PALETTE[hash % TECH_COLOR_PALETTE.length];
}

function CalendarView({ requests, onSelect, loading }) {
  const [cursor, setCursor] = useState(new Date());

  // Any request with a Scheduled Start shows on the calendar, regardless of
  // status — Resolved/Closed jobs stay visible here for future reference,
  // even though they've dropped off the main dashboard.
  const scheduled = useMemo(
    () => requests.filter(r => r["Scheduled Start"]),
    [requests]
  );

  // Unique list of techs actually appearing on the calendar, for the legend.
  const techsInView = useMemo(() => {
    const names = new Set(scheduled.map(r => r["Assigned Tech"]).filter(Boolean));
    return Array.from(names).sort();
  }, [scheduled]);

  const monday = getMonday(cursor);
  const weekDays = [0, 1, 2, 3, 4].map((n) => addDays(monday, n)); // Mon–Fri only
  const today = new Date();

  // A multi-day job (Scheduled Start through Scheduled End) appears on every
  // day it spans, not just its start day.
  const itemsForDay = (day) =>
    scheduled
      .filter((r) => {
        const start = new Date(r["Scheduled Start"]);
        if (isNaN(start)) return false;
        const end = r["Scheduled End"] ? new Date(r["Scheduled End"]) : start;
        const d = dateOnly(day);
        return d >= dateOnly(start) && d <= dateOnly(end);
      })
      .sort((a, b) => new Date(a["Scheduled Start"]) - new Date(b["Scheduled Start"]));

  const weekLabel = () => {
    const start = weekDays[0];
    const end = weekDays[4];
    const sameMonth = start.getMonth() === end.getMonth() && start.getFullYear() === end.getFullYear();
    const startStr = start.toLocaleDateString(undefined, { month: "short", day: "numeric" });
    if (sameMonth) {
      return `${startStr} – ${end.getDate()}, ${end.getFullYear()}`;
    }
    const endStr = end.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
    return `${startStr} – ${endStr}`;
  };

  if (loading) {
    return (
      <div className="flex items-center justify-center py-24" style={{ color: "#8B94A3" }}>
        <Loader2 className="animate-spin mr-2" size={18} /> Loading calendar…
      </div>
    );
  }

  return (
    <div className="rounded-xl border p-4" style={{ background: "#1A222C", borderColor: "#242D3A" }}>
      <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
        <div className="flex items-center gap-2">
          <button onClick={() => setCursor(addDays(monday, -7))} className="p-1.5 rounded-lg" style={{ background: "#242D3A" }}>
            <ChevronLeft size={16} color="#8B94A3" />
          </button>
          <div className="font-bold text-base min-w-[170px] text-center" style={{ fontFamily: "'Oswald', sans-serif" }}>
            {weekLabel()}
          </div>
          <button onClick={() => setCursor(addDays(monday, 7))} className="p-1.5 rounded-lg" style={{ background: "#242D3A" }}>
            <ChevronRight size={16} color="#8B94A3" />
          </button>
        </div>
        <button
          onClick={() => setCursor(new Date())}
          className="px-3 py-1.5 rounded-lg text-xs font-semibold"
          style={{ background: "#242D3A", color: "#F5A623" }}
        >
          Today
        </button>
      </div>

      {techsInView.length > 0 && (
        <div className="flex items-center gap-x-4 gap-y-1.5 flex-wrap mb-4 pb-4 border-b" style={{ borderColor: "#242D3A" }}>
          <span className="text-[11px] font-semibold tracking-widest uppercase" style={{ color: "#8B94A3" }}>Tech</span>
          {techsInView.map((name) => (
            <span key={name} className="flex items-center gap-1.5 text-xs" style={{ color: "#C7CDD6" }}>
              <span className="w-2.5 h-2.5 rounded-full" style={{ background: techColor(name) }} />
              {name}
            </span>
          ))}
        </div>
      )}

      <div className="grid grid-cols-5 gap-3">
        {weekDays.map((day, i) => {
          const items = itemsForDay(day);
          const isToday = sameDay(day, today);
          return (
            <div key={i} className="min-w-0">
              <div
                className="text-center rounded-lg py-2 mb-2"
                style={{ background: isToday ? "#242D3A" : "transparent", border: isToday ? "1px solid #F5A623" : "1px solid transparent" }}
              >
                <div className="text-[11px] font-semibold tracking-widest uppercase" style={{ color: "#8B94A3" }}>
                  {day.toLocaleDateString(undefined, { weekday: "short" })}
                </div>
                <div className="text-sm font-bold" style={{ color: isToday ? "#F5A623" : "#E8EAED", fontFamily: "'Oswald', sans-serif" }}>
                  {day.toLocaleDateString(undefined, { month: "short", day: "numeric" })}
                </div>
              </div>

              <div className="space-y-2 min-h-[80px]">
                {items.length === 0 ? (
                  <div className="text-xs text-center py-6 rounded-lg border border-dashed" style={{ borderColor: "#242D3A", color: "#4A5262" }}>
                    —
                  </div>
                ) : (
                  items.map((r) => {
                    const { totalDays, dayIndex, isMultiDay } = spanInfo(r, day);
                    let timeLabel;
                    if (!isMultiDay) {
                      timeLabel = new Date(r["Scheduled Start"]).toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
                    } else if (dayIndex === 1) {
                      timeLabel = "Starts " + new Date(r["Scheduled Start"]).toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
                    } else if (dayIndex === totalDays) {
                      timeLabel = "Ends " + new Date(r["Scheduled End"]).toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
                    } else {
                      timeLabel = "All day";
                    }
                    return (
                      <div
                        key={r["Request ID"] + "-" + i}
                        onClick={() => onSelect(r)}
                        className="p-2.5 rounded-lg border cursor-pointer"
                        style={{ background: "#161D26", borderColor: techColor(r["Assigned Tech"]), borderLeftWidth: "3px" }}
                      >
                        <div className="flex items-center justify-between mb-1">
                          <span className="text-[10px] font-mono" style={{ color: "#F5A623" }}>{r["Request ID"]}</span>
                          <span className="text-[10px] font-semibold" style={{ color: "#8B94A3" }}>{timeLabel}</span>
                        </div>
                        <div className="text-xs font-medium mb-1 truncate" style={{ color: "#E8EAED" }}>{r["Company"]}</div>
                        {isMultiDay && (
                          <div className="text-[10px] mb-1 font-semibold" style={{ color: "#F5A623" }}>
                            Day {dayIndex} of {totalDays}
                          </div>
                        )}
                        <div className="mb-1"><PriorityTag priority={r.Priority} /></div>
                        <div className="flex items-center justify-between gap-1">
                          {r["Assigned Tech"] ? (
                            <span className="text-[10px] flex items-center gap-1 truncate" style={{ color: "#8B94A3" }}>
                              <User size={10} /> {r["Assigned Tech"]}
                            </span>
                          ) : <span />}
                          <StatusBadge status={r.Status} />
                        </div>
                      </div>
                    );
                  })
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div>
      <label className="block text-[11px] font-semibold tracking-widest uppercase mb-1.5" style={{ color: "#8B94A3" }}>{label}</label>
      {children}
    </div>
  );
}

function LoginScreen({ onLogin, loading, error }) {
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");

  const submit = (e) => {
    e.preventDefault();
    if (username && password && !loading) onLogin(username, password);
  };

  return (
    <div
      className="w-full min-h-[720px] flex items-center justify-center p-4"
      style={{ background: "#12181F", fontFamily: "'Inter', sans-serif", color: "#E8EAED" }}
    >
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');
      `}</style>
      <div className="w-full max-w-sm">
        <div className="flex items-center gap-2 mb-6 justify-center">
          <ClipboardList size={20} color="#F5A623" />
          <div className="text-center">
            <div className="text-[11px] tracking-[0.2em] uppercase" style={{ color: "#F5A623" }}>SITECH</div>
            <div className="text-lg font-bold" style={{ fontFamily: "'Oswald', sans-serif" }}>Support Desk</div>
          </div>
        </div>

        <form
          onSubmit={submit}
          className="rounded-xl border p-5 space-y-4"
          style={{ background: "#161D26", borderColor: "#242D3A" }}
        >
          <div className="flex items-center gap-2 mb-1" style={{ color: "#8B94A3" }}>
            <Lock size={14} />
            <span className="text-sm">Sign in to continue</span>
          </div>

          <Field label="Username">
            <input
              value={username}
              onChange={(e) => setUsername(e.target.value)}
              autoFocus
              className="w-full px-3 py-2 rounded-lg text-sm outline-none"
              style={{ background: "#1A222C", border: "1px solid #242D3A", color: "#E8EAED" }}
            />
          </Field>

          <Field label="Password">
            <input
              type="password"
              value={password}
              onChange={(e) => setPassword(e.target.value)}
              className="w-full px-3 py-2 rounded-lg text-sm outline-none"
              style={{ background: "#1A222C", border: "1px solid #242D3A", color: "#E8EAED" }}
            />
          </Field>

          {error && (
            <p className="text-sm px-3 py-2 rounded-lg" style={{ background: "#3A1F1C", color: "#FF6B5E" }}>{error}</p>
          )}

          <button
            type="submit"
            disabled={!username || !password || loading}
            className="w-full py-2.5 rounded-lg text-sm font-semibold flex items-center justify-center gap-2 disabled:opacity-50"
            style={{ background: "#F5A623", color: "#12181F" }}
          >
            {loading && <Loader2 size={14} className="animate-spin" />} Log In
          </button>
        </form>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<SitechSupportApp />);

</script>
